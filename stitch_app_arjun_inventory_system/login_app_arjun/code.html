            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="font-body-md text-on-surface m-0 p-0">
<!-- Login Container -->
<main class="min-h-screen flex items-center justify-center p-margin relative overflow-hidden">
<!-- Background Decorative Element -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-surface-variant blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-secondary-fixed blur-3xl"></div>
</div>
<!-- Login Card -->
<section class="relative z-10 w-full max-w-[440px] bg-white border border-outline-variant shadow-[0px_1px_3px_rgba(0,0,0,0.05)] rounded-xl p-xl flex flex-col gap-lg">
<!-- Branding Header -->
<header class="flex flex-col items-center text-center gap-sm">
<!-- Logo Icon (Blue Box) -->
<div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-white text-3xl" data-icon="inventory_2">inventory_2</span>
</div>
<div class="mt-sm">
<h1 class="font-h1 text-h1 text-primary tracking-tight">APP ARJUN</h1>
<p class="font-body-sm text-on-surface-variant">Inventory Management Systems</p>
</div>
</header>
<!-- Authentication Form -->
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant px-xs" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="mail">mail</span>
<input class="w-full pl-[44px] pr-md py-[10px] bg-white border border-outline-variant rounded-lg font-body-sm text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none" id="email" placeholder="nombre@empresa.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-center px-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Contraseña</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline" href="#">¿Olvidó su contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-[44px] pr-[44px] py-[10px] bg-white border border-outline-variant rounded-lg font-body-sm text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center gap-sm px-xs mt-xs">
<input class="w-4 h-4 rounded border-outline-variant text-secondary focus:ring-secondary" id="remember" type="checkbox"/>
<label class="font-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Recordar sesión en este equipo</label>
</div>
<!-- Submit Button (Green) -->
<button class="w-full mt-sm py-md bg-[#16A34A] hover:bg-[#15803d] active:scale-[0.98] transition-all text-white font-label-md rounded-lg flex items-center justify-center gap-sm shadow-sm" type="submit">
                    ACCEDER AL PANEL
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Links/Security Info -->
<footer class="mt-sm pt-md border-t border-outline-variant flex flex-col items-center gap-sm">
<div class="flex items-center gap-xs text-on-surface-variant opacity-70">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
<span class="font-label-sm">Conexión segura SSL de 256 bits</span>
</div>
<div class="w-full h-40 mt-sm overflow-hidden rounded-lg">
<img alt="Inventory Warehouse" class="w-full h-full object-cover" data-alt="A vast and highly organized modern industrial warehouse with high-key lighting illuminating tall racks of meticulously stacked shipping pallets. The scene is captured in a crisp, light-mode corporate aesthetic, emphasizing cleanliness and professional efficiency. The color palette is dominated by neutral grays and whites, reflecting the precision of a global inventory management system. The mood is calm, secure, and technologically advanced." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0ZOW1eNEVxgvrv-a5HIzMDPX2bruCoXmJz3KbTRP9lnwwvqosuMg9dmm0Ln2MCgX23eQ-DGGA0L2GFqVswybj6wfzkf9h6DCjhBBHm2X5SAnGi1cIc-XzFQQiGqZiFjSl4v6vLjzWM0rQDUzqy7YeObsM0R9vYgEWgsTRwAhRT3mPAEff2ORmoQx35FL8mJKzoJ6qoumhRMAQnfH3JTcnZm-CBfQsgYPzhMl-xUKJzwjLGva45bBIYZ5IvKaBMboGlrcVO89v4e8"/>
</div>

</footer>
